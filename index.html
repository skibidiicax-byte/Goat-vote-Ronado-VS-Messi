<!DOCTYPE html>
<html>
<head>
<title>GOAT Vote</title>
</head>
<body style="text-align:center;font-family:Arial;background:#111;color:white;">

<h1>GOAT Vote</h1>

<button onclick="messi()">Vote Messi</button>
<button onclick="ronaldo()">Vote Ronaldo</button>

<h2>Messi: <span id="m">0</span></h2>
<h2>Ronaldo: <span id="r">0</span></h2>

<script>
let m = 0;
let r = 0;

function messi(){
  m++;
  document.getElementById("m").innerText = m;
}

function ronaldo(){
  r++;
  document.getElementById("r").innerText = r;
}
</script>

</body>
</html>
