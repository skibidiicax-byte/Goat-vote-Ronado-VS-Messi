<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GOAT Vote Global</title>
<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 40px;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  width: 220px;
}

button {
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
}

.messi { background: #2d7dff; color: white; }
.ronaldo { background: #ff3b3b; color: white; }

.bar {
  width: 60%;
  height: 25px;
  background: #333;
  margin: 40px auto;
  border-radius: 20px;
  overflow: hidden;
  display: flex;
}

.mbar { background: #2d7dff; }
.rbar { background: #ff3b3b; }
</style>
</head>

<body>

<h1>GOAT Debate (GLOBAL)</h1>

<div class="container">
  <div class="card">
    <h2>Messi</h2>
    <button class="messi" onclick="vote('messi')" id="mBtn">Vote Messi</button>
    <p id="messiVotes">0</p>
  </div>

  <div class="card">
    <h2>Ronaldo</h2>
    <button class="ronaldo" onclick="vote('ronaldo')" id="rBtn">Vote Ronaldo</button>
    <p id="ronaldoVotes">0</p>
  </div>
</div>

<div class="bar">
  <div id="mbar" class="mbar"></div>
  <div id="rbar" class="rbar"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 🔴 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// vote lock per device
let voted = localStorage.getItem("voted");

function vote(player) {
  if (voted) return;

  const ref = db.ref("votes/" + player);
  ref.transaction(current => (current || 0) + 1);

  localStorage.setItem("voted", player);
  voted = player;
}

// realtime updates
db.ref("votes").on("value", snap => {
  let data = snap.val() || {messi: 0, ronaldo: 0};

  document.getElementById("messiVotes").innerText = data.messi || 0;
  document.getElementById("ronaldoVotes").innerText = data.ronaldo || 0;

  let total = (data.messi || 0) + (data.ronaldo || 0);

  let m = total ? (data.messi / total) * 100 : 50;
  let r = total ? (data.ronaldo / total) * 100 : 50;

  document.getElementById("mbar").style.width = m + "%";
  document.getElementById("rbar").style.width = r + "%";
});
</script>

</body>
</html>
